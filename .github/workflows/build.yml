name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Publicar release con este tag (p. ej. v1.10.0). gh lo crea si no existe. Vacío = solo compilar."
        required: false
        default: ''

permissions:
  contents: write

# Tag efectivo de release: el del push de tag, o el indicado a mano en un
# workflow_dispatch (útil cuando no se puede hacer push de tags)
env:
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || inputs.release_tag }}

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Sin dependencias de runtime: basta comprobar que todo carga
      - name: Comprobación de sintaxis
        run: |
          node --check server.js
          node --check lib/config.js
          node --check lib/providers.js
          node --check lib/agent.js
          node --check lib/media.js
      - name: Tests automatizados
        run: npm test
      - name: Arranque de humo
        shell: pwsh
        run: |
          $env:DEDLIT_PORT = '8642'
          $proc = Start-Process node -ArgumentList 'server.js' -PassThru -NoNewWindow
          Start-Sleep 3
          $res = Invoke-WebRequest http://127.0.0.1:8642/api/config -UseBasicParsing
          if ($res.StatusCode -ne 200) { exit 1 }
          Stop-Process -Id $proc.Id -Force

  exe-windows:
    runs-on: windows-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build:exe
      - run: npm run build:webcam
      - run: Rename-Item dist/dedlit-studio.exe dedlit-studio-win-x64.exe
        shell: pwsh
      # Los artefactos consumen cuota de almacenamiento (limitada en repos
      # privados): son solo una comodidad para builds de main, no deben
      # tumbar el workflow si la cuota está llena
      - uses: actions/upload-artifact@v4
        if: env.RELEASE_TAG == ''
        continue-on-error: true
        with:
          name: dedlit-studio-win-x64
          path: |
            dist/dedlit-studio-win-x64.exe
            dist/dedlit-webcam.exe
          retention-days: 1
      # En las releases los binarios van directos a los assets de la release,
      # que no consumen cuota de artefactos
      - name: Publicar en release
        if: env.RELEASE_TAG != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:RELEASE_TAG" --target "$env:GITHUB_SHA" --title "$env:RELEASE_TAG" --generate-notes 2>$null; if (-not $?) { "release ya existe" }
          gh release upload "$env:RELEASE_TAG" dist/dedlit-studio-win-x64.exe dist/dedlit-webcam.exe --clobber

  exe-linux:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      # En el runner nativo de Linux el bytecode sí funciona
      - run: npx pkg . --targets node22-linux-x64
      - run: mv dist/dedlit-studio dist/dedlit-studio-linux-x64
      - uses: actions/upload-artifact@v4
        if: env.RELEASE_TAG == ''
        continue-on-error: true
        with:
          name: dedlit-studio-linux-x64
          path: dist/dedlit-studio-linux-x64
          retention-days: 1
      - name: Publicar en release
        if: env.RELEASE_TAG != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes 2>/dev/null || echo "release ya existe"
          gh release upload "$RELEASE_TAG" dist/dedlit-studio-linux-x64 --clobber

  exe-macos:
    # En macOS pkg firma (ad-hoc) los binarios automáticamente,
    # imprescindible para Apple Silicon
    runs-on: macos-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build:macos
      - run: |
          mv dist/dedlit-studio-x64 dist/dedlit-studio-macos-x64
          mv dist/dedlit-studio-arm64 dist/dedlit-studio-macos-arm64
      - uses: actions/upload-artifact@v4
        if: env.RELEASE_TAG == ''
        continue-on-error: true
        with:
          name: dedlit-studio-macos
          path: |
            dist/dedlit-studio-macos-x64
            dist/dedlit-studio-macos-arm64
          retention-days: 1
      - name: Crear DMG (Apple Silicon)
        run: |
          VERSION="${RELEASE_TAG#v}"
          [ -z "$VERSION" ] && VERSION="0.0.0-dev"
          APP="build/DEDLIT Studio.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          sed "s/__VERSION__/$VERSION/g" packaging/macos/Info.plist > "$APP/Contents/Info.plist"
          cp packaging/macos/launcher.sh "$APP/Contents/MacOS/launcher"
          cp dist/dedlit-studio-macos-arm64 "$APP/Contents/MacOS/dedlit-studio"
          chmod +x "$APP/Contents/MacOS/launcher" "$APP/Contents/MacOS/dedlit-studio"
          # icono .icns a partir del PNG
          mkdir icon.iconset
          for s in 16 32 128 256 512; do
            sips -z $s $s packaging/macos/icon.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
            sips -z $((s*2)) $((s*2)) packaging/macos/icon.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/dedlit.icns"
          codesign --force --deep --sign - "$APP"
          # DMG con acceso directo a Aplicaciones
          mkdir dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "DEDLIT Studio" -srcfolder dmgroot -ov -format UDZO "dist/DEDLIT-Studio-arm64.dmg"

      - name: Publicar en release
        if: env.RELEASE_TAG != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" --target "$GITHUB_SHA" --title "$RELEASE_TAG" --generate-notes 2>/dev/null || echo "release ya existe"
          gh release upload "$RELEASE_TAG" dist/dedlit-studio-macos-x64 dist/dedlit-studio-macos-arm64 dist/DEDLIT-Studio-arm64.dmg --clobber
